services:
  api:
    container_name: forum-api
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://app.forum.test}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    restart: unless-stopped
    networks:
      - forum.test

networks:
  forum.test:
    name: forum.test
    external: true
